# Gawain AI — Shopify App Configuration
# https://shopify.dev/docs/apps/tools/cli/configuration

# Replace with your actual client_id from Shopify Partner Dashboard
# (Same value as SHOPIFY_API_KEY in GitHub Secrets)
client_id = "6f1eb92ea6d243022431761931dd7b4a"

name = "Gawain AI"
application_url = "https://gawain.nogeass.com/shopify/app"
embedded = true

[build]
automatically_update_urls_on_dev = true

[access_scopes]
# read_products — required to fetch product title, description, images, and
# variants so Gawain can generate promotional videos for those products.
# write_products and write_files are NOT requested: this app only reads
# product data and renders videos via the theme extension; no Shopify data
# is modified by the app.
scopes = "read_products"

[auth]
redirect_urls = [
  "https://gawain.nogeass.com/api/shopify/callback"
]

[webhooks]
api_version = "2025-01"

  [webhooks.privacy_compliance]
  customer_data_request_url = "https://gawain.nogeass.com/api/shopify/webhooks"
  customer_deletion_url = "https://gawain.nogeass.com/api/shopify/webhooks"
  shop_deletion_url = "https://gawain.nogeass.com/api/shopify/webhooks"
